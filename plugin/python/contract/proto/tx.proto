syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

import "google/protobuf/any.proto";
// Transaction represents a request or action submitted to the network like transfer assets or perform other operations
// within the blockchain system - THIS MUST MATCH lib.Transaction EXACTLY for signing
message Transaction {
  string message_type = 1; // @gotags: json:"messageType"
  google.protobuf.Any msg = 2;
  Signature signature = 3;
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  uint64 time = 5;
  uint64 fee = 6;
  string memo = 7;
  uint64 network_id = 8; // @gotags: json:"networkID"
  uint64 chain_id = 9; // @gotags: json:"chainID"
}

// MessageSend is a standard transfer transaction
message MessageSend {
  bytes from_address = 1; // @gotags: json:"fromAddress"
  bytes to_address = 2; // @gotags: json:"toAddress"
  uint64 amount = 3;
}

// FeeParams defines transaction fees
message FeeParams {
  uint64 send_fee = 1; // @gotags: json:"sendFee"
  uint64 create_escrow_fee = 2; // @gotags: json:"createEscrowFee"
  uint64 release_fee = 3; // @gotags: json:"releaseFee"
  uint64 refund_fee = 4; // @gotags: json:"refundFee"
}

// MessageCreateEscrow creates a new escrow contract between buyer and seller
message MessageCreateEscrow {
  // buyer: the address creating the escrow (deposits funds)
  bytes buyer = 1; // @gotags: json:"buyer"
  // seller: the address that will receive funds on release
  bytes seller = 2; // @gotags: json:"seller"
  // amount: the amount of tokens locked in escrow
  uint64 amount = 3;
  // description: what the escrow is for (e.g. "NFT purchase #1234")
  string description = 4;
  // timeout_height: block height after which buyer can claim refund
  uint64 timeout_height = 5; // @gotags: json:"timeoutHeight"
}

// MessageRelease releases escrowed funds to the seller
message MessageRelease {
  // buyer: must be the original buyer to authorize release
  bytes buyer = 1; // @gotags: json:"buyer"
  // escrow_id: the unique ID of the escrow to release
  uint64 escrow_id = 2; // @gotags: json:"escrowId"
}

// MessageRefund returns escrowed funds to the buyer (after timeout or dispute)
message MessageRefund {
  // claimer: the buyer claiming the refund
  bytes claimer = 1; // @gotags: json:"claimer"
  // escrow_id: the unique ID of the escrow to refund
  uint64 escrow_id = 2; // @gotags: json:"escrowId"
}

message Signature {
  bytes public_key = 1; // @gotags: json:"publicKey"
  bytes signature = 2;
}
