syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

message Account {
  bytes address = 1;
  uint64 amount = 2;
  // escrows_created: number of escrows this account has created as buyer
  uint64 escrows_created = 3;
  // escrows_released: number of escrows this account has released as buyer
  uint64 escrows_released = 4;
  // escrows_received: number of escrows this account has received payment as seller
  uint64 escrows_received = 5;
}

message Pool {
  uint64 id = 1;
  uint64 amount = 2;
}

// Escrow represents an on-chain escrow contract
message Escrow {
  // id: unique escrow identifier (auto-incremented)
  uint64 id = 1;
  // buyer: address that created and funded the escrow
  bytes buyer = 2;
  // seller: address that receives funds when released
  bytes seller = 3;
  // amount: tokens locked in escrow
  uint64 amount = 4;
  // description: what the escrow is for
  string description = 5;
  // timeout_height: block height after which refund is allowed
  uint64 timeout_height = 6;
  // status: 0=active, 1=released, 2=refunded
  uint64 status = 7;
  // created_height: block height when escrow was created
  uint64 created_height = 8;
}
